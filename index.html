<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>UB Academic Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;700;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#1e3a8a;--blue2:#2563eb;--blue3:#dbeafe;
  --gold:#f59e0b;--gold2:#fbbf24;--gold3:#fef3c7;
  --green:#059669;--green2:#d1fae5;--green3:#6ee7b7;
  --red:#ef4444;--red2:#fee2e2;
  --purple:#7c3aed;--purple2:#ede9fe;
  --pink:#ec4899;--pink2:#fce7f3;
  --orange:#f97316;--orange2:#ffedd5;
  --teal:#0d9488;--teal2:#ccfbf1;
  --bg:#f8faff;--card:#fff;--text:#0f172a;--muted:#64748b;
  --border:#e2e8f0;--shadow:0 4px 24px rgba(30,58,138,.08);
  --sidebar:265px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;}
.hidden{display:none!important;}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
@keyframes gradientShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}

/* APP SHELL */
#appScreen{display:flex;min-height:100vh;}

/* SIDEBAR */
.sidebar{width:var(--sidebar);min-height:100vh;
  background:linear-gradient(180deg,#0f172a 0%,#1e1b4b 100%);
  display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;
  z-index:50;transition:transform .35s;overflow-y:auto;
  border-right:1px solid rgba(255,255,255,.06);}
.sidebar-brand{padding:24px 20px 18px;border-bottom:1px solid rgba(255,255,255,.08);}
.sb-logo{display:flex;align-items:center;gap:12px;}
.sb-badge{width:40px;height:40px;background:linear-gradient(135deg,var(--gold),var(--orange));
  border-radius:11px;display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;
  font-size:1rem;color:#fff;font-weight:900;}
.sb-title{font-family:'Fraunces',serif;font-size:1.08rem;color:#fff;line-height:1.2;}
.sidebar-nav{flex:1;padding:14px 12px;}
.nav-item{display:flex;align-items:center;gap:11px;padding:11px 12px;border-radius:12px;
  cursor:pointer;transition:all .25s;color:rgba(255,255,255,.55);font-size:.87rem;font-weight:500;
  border:none;background:transparent;width:100%;text-align:left;}
.nav-item:hover{color:#fff;background:rgba(255,255,255,.05);}
.nav-item.on{color:#fff;background:linear-gradient(135deg,var(--blue2),var(--purple));font-weight:700;}

/* MAIN CONTENT */
.main{margin-left:var(--sidebar);flex:1;padding:30px 28px;}
.page{display:none;}
.page.on{display:block;animation:fadeUp .4s ease;}
.card{background:var(--card);border-radius:18px;padding:26px;box-shadow:var(--shadow);margin-bottom:22px;border:1px solid var(--border);}
.card-title{font-family:'Fraunces',serif;font-size:1.08rem;color:var(--text);margin-bottom:16px;display:flex;align-items:center;gap:9px;}
.card-title::before{content:'';width:4px;height:22px;background:linear-gradient(180deg,var(--blue2),var(--purple));border-radius:2px;}

/* PEERBRIDGE SPECIFIC */
.pb-banner{border-radius:22px;padding:28px 30px;margin-bottom:22px;
  background:linear-gradient(135deg,#1e3a8a,#7c3aed,#ec4899);
  display:flex;align-items:center;justify-content:space-between;color:#fff;}
.pb-rate-badge{background:rgba(255,255,255,.15);backdrop-filter:blur(10px);padding:14px 22px;border-radius:16px;text-align:center;}
.pb-rate-amt{font-family:'Fraunces',serif;font-size:1.8rem;font-weight:900;}
.pb-rate-lbl{font-size:.7rem;text-transform:uppercase;opacity:.8;}

.req-card{background:#fff;border-radius:16px;border:1px solid var(--border);padding:18px;margin-bottom:12px;transition:all .3s;}
.req-card:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,0,0,.05);}
.mod-tag{display:inline-block;padding:4px 10px;border-radius:20px;background:var(--blue3);color:var(--blue);font-size:.72rem;font-weight:700;margin-bottom:8px;}
.req-meta{display:flex;align-items:center;gap:12px;margin-top:12px;}
.pula-chip{background:var(--green2);color:var(--green);padding:4px 11px;border-radius:20px;font-size:.74rem;font-weight:700;}
.badge-open{background:var(--green2);color:var(--green);padding:3px 10px;border-radius:20px;font-size:.7rem;font-weight:700;}

/* FORMS */
.ff{margin-bottom:15px;}
.ff label{display:block;font-size:.75rem;font-weight:700;color:var(--muted);margin-bottom:6px;text-transform:uppercase;}
.ff input, .ff select, .ff textarea{width:100%;padding:11px;border:2px solid var(--border);border-radius:10px;outline:none;}
.btn{padding:10px 20px;border:none;border-radius:11px;cursor:pointer;font-weight:700;display:inline-flex;align-items:center;gap:7px;transition:all .25s;}
.btn-purple{background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff;}
</style>
</head>
<body>

<div id="appScreen">
  <div class="sidebar">
    <div class="sidebar-brand">
      <div class="sb-logo">
        <div class="sb-badge">UB</div>
        <div class="sb-title">Academic Hub</div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <button class="nav-item on" onclick="showPage('peerbridge')"><span class="ni">🤝</span><span>PeerBridge</span></button>
      <button class="nav-item" onclick="showPage('study')"><span class="ni">📚</span><span>Study Portal</span></button>
      <button class="nav-item" onclick="showPage('gpa')"><span class="ni">📈</span><span>GPA Tracker</span></button>
    </nav>
  </div>

  <main class="main">
    
    <div id="peerbridge" class="page on">
      <div class="page-header">
        <h1>PeerBridge</h1>
        <p>Interactive peer-to-peer support for your modules.</p>
      </div>

      <div class="pb-banner">
        <div>
          <h2>Get Interactive Help</h2>
          <p>Post a request or help a peer to earn and learn.</p>
        </div>
        <div class="pb-rate-badge">
          <div class="pb-rate-amt">P20</div>
          <div class="pb-rate-lbl">Per Hour Rate</div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">Create a Support Request</div>
        <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:15px;">
          <div class="ff">
            <label>Module / Topic</label>
            <input type="text" id="reqTopic" placeholder="e.g. Fluid Mechanics">
          </div>
          <div class="ff">
            <label>Time Needed</label>
            <select id="reqDuration" onchange="calcCost()">
              <option value="0.5">30 Minutes</option>
              <option value="0.75">45 Minutes</option>
              <option value="1.0" selected>1 Hour</option>
              <option value="1.25">1h 15m</option>
              <option value="1.5">1h 30m</option>
              <option value="1.75">1h 45m</option>
              <option value="2.0">2 Hours</option>
              <option value="2.25">2h 15m</option>
              <option value="2.5">2h 30m</option>
              <option value="2.75">2h 45m</option>
              <option value="3.0">3 Hours</option>
            </select>
          </div>
          <div class="ff">
            <label>Meeting Type</label>
            <select id="reqType">
              <option value="Virtual">Virtual (Zoom/Meet)</option>
              <option value="WhatsApp">Through WhatsApp</option>
              <option value="Physical">Physical Meeting</option>
            </select>
          </div>
        </div>
        <div class="ff">
          <label>Request Details</label>
          <textarea id="reqDetails" placeholder="Briefly describe what you are struggling with..."></textarea>
        </div>
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <div id="estCost" class="pula-chip" style="font-size:1rem; padding:8px 15px;">Cost: P20.00</div>
          <button class="btn btn-purple" onclick="postRequest()">Post Request</button>
        </div>
      </div>

      <div class="card">
        <div class="card-title">Requests Sent (Live Feed)</div>
        <div id="requestsFeed">
          </div>
      </div>
    </div>

    <div id="study" class="page"><h1>Study Portal</h1></div>
    <div id="gpa" class="page"><h1>GPA Tracker</h1></div>

  </main>
</div>

<script>
const RATE = 20;
let requests = [
  { id: 1, user: "K. Molosi", topic: "Calculus II", duration: "1h 30m", type: "WhatsApp", cost: "P30.00", status: "Open" }
];

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
  document.getElementById(id).classList.add('on');
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('on'));
  event.currentTarget.classList.add('on');
}

function calcCost() {
  const hours = parseFloat(document.getElementById('reqDuration').value);
  const total = (hours * RATE).toFixed(2);
  document.getElementById('estCost').textContent = `Cost: P${total}`;
}

function renderRequests() {
  const feed = document.getElementById('requestsFeed');
  feed.innerHTML = requests.length ? '' : '<p style="color:var(--muted); text-align:center;">No requests yet.</p>';
  
  requests.forEach(req => {
    feed.innerHTML += `
      <div class="req-card">
        <span class="mod-tag">${req.topic}</span>
        <div style="display:flex; justify-content:space-between; align-items:flex-start;">
          <div>
            <h4 style="font-weight:800;">Help needed by ${req.user}</h4>
            <p style="font-size:.85rem; color:var(--muted); margin-top:4px;">Duration: ${req.duration} • ${req.type}</p>
          </div>
          <span class="badge-open">Open</span>
        </div>
        <div class="req-meta">
          <div class="pula-chip">${req.cost}</div>
          <button class="btn" style="background:var(--blue3); color:var(--blue); font-size:.75rem; margin-left:auto;">Accept & Message</button>
        </div>
      </div>
    `;
  });
}

function postRequest() {
  const topic = document.getElementById('reqTopic').value;
  const details = document.getElementById('reqDetails').value;
  const duration = document.getElementById('reqDuration').options[document.getElementById('reqDuration').selectedIndex].text;
  const hours = parseFloat(document.getElementById('reqDuration').value);
  const type = document.getElementById('reqType').value;

  if(!topic || !details) return alert("Please fill in the topic and details!");

  const newReq = {
    id: Date.now(),
    user: "You",
    topic: topic,
    duration: duration,
    type: type,
    cost: `P${(hours * RATE).toFixed(2)}`,
    status: "Open"
  };

  requests.unshift(newReq);
  renderRequests();
  
  // Clear fields
  document.getElementById('reqTopic').value = '';
  document.getElementById('reqDetails').value = '';
  alert("Request posted to the community!");
}

// Init
renderRequests();
</script>

</body>
</html>
