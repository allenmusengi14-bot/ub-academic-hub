<!DOCTYPE html>
<html>
<head>
    <title>Firebase Test</title>
</head>
<body>
    <h2>Firebase Connection Test</h2>
    <div id="status">Testing connection...</div>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBg8om9AP7dase-Zoc80eojfP8kQI5qtho",
            authDomain: "ub-academic-hub.firebaseapp.com",
            projectId: "ub-academic-hub",
            storageBucket: "ub-academic-hub.firebasestorage.app",
            messagingSenderId: "972839460503",
            appId: "1:972839460503:web:34b8d9d99da370239f13d2"
        };

        const status = document.getElementById('status');

        try {
            status.innerHTML = '🔄 Initializing Firebase...';
            const app = initializeApp(firebaseConfig);
            status.innerHTML = '✅ Firebase initialized!';
            
            const db = getFirestore(app);
            status.innerHTML = '✅ Firestore connected!';
            
            // Try to write test data
            status.innerHTML = '🔄 Testing write access...';
            const testRef = doc(db, 'test', 'connection');
            await setDoc(testRef, {
                timestamp: new Date().toISOString(),
                message: 'Connection successful!'
            });
            status.innerHTML = '✅ Write successful!';
            
            // Try to read test data
            status.innerHTML = '🔄 Testing read access...';
            const testDoc = await getDoc(testRef);
            if (testDoc.exists()) {
                status.innerHTML = '✅ Read successful! Your Firebase is working perfectly!';
            } else {
                status.innerHTML = '❌ Read failed';
            }
            
        } catch (error) {
            status.innerHTML = `❌ ERROR: ${error.message}`;
            console.error('Full error:', error);
        }
    </script>
</body>
</html>
